name: Generate Headlines

on:
  schedule:
    # Run daily at 8:00 AM UTC
    - cron: '0 8 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate headlines (All ranges)
        run: |
          mkdir -p docs
          node src/cli.js --range today --outdir docs
          node src/cli.js --range week --outdir docs
          node src/cli.js --range month --outdir docs
          node src/cli.js --range all --outdir docs
          cp docs/week.html docs/index.html

      - name: Commit & push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git diff --staged --quiet || (git commit -m "Auto-generate headlines $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)

      - name: Done!
        run: echo "Headlines updated successfully!"
